<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/normalize.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <script src="./scripts/script.js" defer></script>
    <title>sign-up-form</title>
  </head>
  <body>
    <div class="wrapper">
      <aside>
        <div class="logo-container">
          <img
            src="./assets/images/odin-lined.png"
            alt="odin-logo"
            width="110px"
            height="auto"
          />
          <span>Odin</span>
        </div>
        <p>
          Photo by
          <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on
          <a href="https://unsplash.com/">Unsplash</a>
        </p>
      </aside>
      <main>
        <section class="top-section">
          <p>
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams.
            <br />Sign up <em>now</em> to get started. <br /><br />
            You <em>know</em> you want to.
          </p>
        </section>
        <section class="form-section">
          <form id="form" action="#">
            <fieldset>
              <legend>Let's do this!</legend>
              <ul>
                <li>
                  <label for="firstname">FIRST NAME</label>
                  <input
                    type="text"
                    id="firstname"
                    name="first_name"
                    required
                  />
                </li>
                <li>
                  <label for="lastname">LAST NAME</label>
                  <input type="text" id="lastname" name="last_name" required />
                </li>
                <li>
                  <label for="email">EMAIL</label>
                  <input type="email" id="email" name="email" required />
                </li>
                <li>
                  <label for="phonenumber">PHONE NUMBER</label>
                  <input
                    type="number"
                    id="phonenumber"
                    name="phone_number"
                    required
                  />
                </li>
                <li>
                  <label for="password">PASSWORD</label>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                    title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                    required
                  />
                </li>
                <li>
                  <label for="confirm-password">CONFIRM PASSWORD</label>
                  <input
                    type="password"
                    id="confirm-password"
                    class="error"
                    name="confirm_password"
                    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                    title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                    required
                  />
                </li>
              </ul>
            </fieldset>
          </form>
        </section>
        <section class="bottom-section">
          <button form="form" type="button">Create Account</button>
          <p>Already have an account? <a href="#0">Log in</a></p>
        </section>
      </main>
    </div>
  </body>
</html>
