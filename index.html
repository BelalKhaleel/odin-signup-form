<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/normalize.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <script src="./scripts/script.js" defer></script>
    <title>sign-up-form</title>
  </head>
  <body>
    <div class="wrapper">
      <aside>
        <div class="logo-container">
          <img
            src="./assets/images/odin-lined.png"
            alt="odin-logo"
            width="110px"
            height="auto"
          />
          <span>Odin</span>
        </div>
        <p>
          Photo by
          <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on
          <a href="https://unsplash.com/">Unsplash</a>
        </p>
      </aside>
      <main>
        <section class="top-section">
          <p>
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams.
            <br />Sign up <em>now</em> to get started. <br /><br />
            You <em>know</em> you want to.
          </p>
        </section>
        <section class="form-section">
          <form id="form" action="#">
            <fieldset>
              <legend>Let's do this!</legend>
              <div>
                <label for="firstname">FIRST NAME</label>
                <input type="text" id="firstname" name="first_name" required />
              </div>
              <div>
                <label for="lastname">LAST NAME</label>
                <input type="text" id="lastname" name="last_name" required />
              </div>
              <div>
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email" required />
              </div>
              <div>
                <label for="phonenumber">PHONE NUMBER</label>
                <input
                  type="number"
                  id="phonenumber"
                  name="phone_number"
                  required
                />
              </div>
              <div>
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password" required />
                <div class="error-message hidden" id="match">
                  <span>*Passwords do not match</span>
                </div>
              </div>
              <div>
                <label for="confirm-password">CONFIRM PASSWORD</label>
                <input
                  type="password"
                  id="confirm-password"
                  class="error"
                  name="confirm_password"
                  required
                />
              </div>
            </fieldset>
          </form>
        </section>
        <section class="bottom-section">
            <button
              form="form"
              type="button"
              id="submit"
              placeholder="Create Account">
            Create Account</button>
          <p>Already have an account? <a>Log in</a></p>
        </section>
      </main>
    </div>
  </body>
</html>
